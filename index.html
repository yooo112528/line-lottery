<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 專屬幸運抽獎</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8f9fa; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 25px; font-weight: bold; }
        .user-info { margin: 20px 0; font-size: 16px; color: #4a5568; background: #edf2f7; padding: 12px; border-radius: 8px; }
        .status-box { font-size: 18px; font-weight: bold; color: #e53e3e; margin: 25px 0; }
        .btn-draw { background: #38a169; color: white; border: none; padding: 16px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: background 0.2s, transform 0.1s; width: 100%; max-width: 280px; box-shadow: 0 4px 6px rgba(56, 161, 105, 0.2); }
        .btn-draw:hover { background: #2f855a; }
        .btn-draw:active { transform: scale(0.98); }
        .btn-draw:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; transform: none; }
        .result-display { margin-top: 30px; font-size: 22px; font-weight: bold; min-height: 60px; padding: 12px; border-radius: 8px; transition: all 0.3s; }
        .loading { display: none; color: #3182ce; font-weight: bold; margin: 15px 0; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>VIP 尊榮抽獎活動</h1>
    
    <div id="auth-section">
        <p style="color: #718096;" id="loading-text">透過 LINE 安全連線中，請稍候...</p>
    </div>

    <div id="lottery-section" style="display: none;">
        <div class="user-info">
            歡迎回來，<span id="user-name" style="font-weight:bold; color:#2b6cb0;">---</span> 貴賓
        </div>
        <div class="status-box">
            您目前的剩餘抽獎次數：<span id="chance-count">0</span> 次
        </div>
        
        <button id="draw-btn" class="btn-draw" onclick="executeDraw()">即刻碰運氣</button>
        <div id="loading-msg" class="loading">⏳ 系統即時開獎中，請稍候...</div>
        
        <div id="result" class="result-display"></div>
    </div>
</div>

<script>

<script>
    const LIFF_ID = '2007048842-6GCYVWk0'; 
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnBBkMhmv1Ax9NM9CIOjSL4fbBlpXt6p1G0NItyXjugoikT5swDoG1FVZ02h5fD_LXyw/exec';  

    let userProfile = {};

    function initLiff() {
        liff.init({ liffId: LIFF_ID })
            .then(() => {
                // 如果網址上有帶 code，代表是 LINE 登入成功跳轉回來的
                const urlParams = new URLSearchParams(window.location.search);
                const hasCode = urlParams.has('code');

                if (!hasCode && !navigator.userAgent.includes("Line")) {
                    // 一般瀏覽器第一次進來，主動導向 LINE 官方驗證
                    liff.login();
                } else {
                    // 已有驗證碼或在 LINE 環境內，直接解析登入
                    liff.getProfile()
                        .then(profile => {
                            userProfile = profile;
                            document.getElementById('auth-section').style.display = 'none';
                            document.getElementById('lottery-section').style.display = 'block';
                            document.getElementById('user-name').innerText = userProfile.displayName;
                            checkChances();
                        })
                        .catch(err => {
                            document.getElementById('loading-text').innerHTML = '<span style="color:#e53e3e">LINE 帳號資料解析失敗。</span>';
                        });
                }
            })
            .catch((error) => {
                document.getElementById('loading-text').innerHTML = '<span style="color:#e53e3e">系統初始化失敗，請重新整理。</span>';
            });
    }

    function checkChances() {
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'check',
                uid: userProfile.userId,
                displayName: userProfile.displayName
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('chance-count').innerText = data.remainChances;
                document.getElementById('draw-btn').disabled = data.remainChances <= 0;
            }
        })
        .catch(err => console.error('檢查次數失敗', err));
    }

    function executeDraw() {
        const drawBtn = document.getElementById('draw-btn');
        const loadingMsg = document.getElementById('loading-msg');
        const resultDiv = document.getElementById('result');
        
        drawBtn.disabled = true;
        loadingMsg.style.display = 'block';
        resultDiv.innerText = '';
        resultDiv.style.background = 'none';

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'draw',
                uid: userProfile.userId,
                displayName: userProfile.displayName
            })
        })
        .then(res => res.json())
        .then(data => {
            loadingMsg.style.display = 'none';
            if (data.success) {
                if (data.result === "銘謝惠顧") {
                    resultDiv.innerText = `😢 銘謝惠顧，下次好運就臨門！`;
                    resultDiv.style.color = '#718096';
                    resultDiv.style.background = '#f7fafc';
                } else {
                    resultDiv.innerText = `🎉 恭喜中獎：${data.result}！`;
                    resultDiv.style.color = '#e53e3e';
                    resultDiv.style.background = '#fff5f5';
                }
                document.getElementById('chance-count').innerText = data.remainChances;
                if (data.remainChances > 0) drawBtn.disabled = false;
            } else {
                alert(data.msg);
                resultDiv.innerText = data.msg;
            }
        })
        .catch(error => {
            loadingMsg.style.display = 'none';
            drawBtn.disabled = false;
            alert('網路超時，請重試一次');
        });
    }

    window.onload = initLiff;
</script>
</body>
</html>
